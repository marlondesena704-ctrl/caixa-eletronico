<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WAYNE-TRUST INTERNATIONAL ENTERPRISES</title>
<style>
  :root{
    --bg: #05070c;
    --bg-panel: #0a0e17;
    --amber: #f5b942;
    --amber-dim: #8a6a2a;
    --signal: #ffd873;
    --red: #ff5c5c;
    --line: #1c2230;
    --text-dim: #5c6478;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Courier New', monospace;
    color: var(--amber);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* bat-signal glow, top right corner */
  .signal {
    position: fixed;
    top: -320px;
    right: -220px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle at center, rgba(255,216,115,0.16) 0%, rgba(255,216,115,0.05) 35%, transparent 65%);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .terminal {
    position: relative;
    width: min(880px, 94vw);
    height: min(640px, 92vh);
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 0 0 1px rgba(245,185,66,0.05), 0 20px 60px rgba(0,0,0,0.6), inset 0 0 80px rgba(245,185,66,0.02);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .titlebar .dots span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--line);
    margin-right: 6px;
  }

  .dot-lit { background: var(--amber-dim) !important; }

  #screen {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px 8px 22px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #screen::-webkit-scrollbar { width: 8px; }
  #screen::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  #screen::-webkit-scrollbar-track { background: transparent; }

  .line-title { color: var(--signal); font-weight: bold; }
  .line-dim { color: var(--text-dim); }
  .line-error { color: var(--red); }
  .line-prompt { color: var(--amber-dim); }
  .line-value { color: var(--signal); font-weight: bold; }

  .input-row {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--line);
    padding: 12px 22px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.01);
  }

  .caret {
    color: var(--signal);
    margin-right: 8px;
    flex-shrink: 0;
  }

  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--amber);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--signal);
  }

  #cmd::placeholder { color: var(--text-dim); }

  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 2px 6px;
  }
</style>
</head>
<body>

<div class="signal"></div>

<div class="terminal">
  <div class="titlebar">
    <div class="dots">
      <span class="dot-lit"></span><span></span><span></span>
      WAYNE-TRUST // TERMINAL SEGURO
    </div>
    <div class="badge">SESSÃO NÃO REGISTRADA</div>
  </div>
  <div id="screen"></div>
  <div class="input-row">
    <span class="caret">&gt;</span>
    <input id="cmd" type="text" autocomplete="off" autofocus placeholder="digite aqui e pressione Enter...">
  </div>
</div>

<script>
const screen = document.getElementById('screen');
const input = document.getElementById('cmd');

const usuarios = ["RODRIGO", "DAVID", "STEVE", "PETER", "BRUCE"];
const senhas   = [154, 223, 359, 254, 893];
let saldos     = [1024, 5000, 584, 15, 99999];

let state = "WELCOME";
let posicaoUsuario = -1;

function println(text, cls) {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}

function blank() { println(""); }

function clearScreen() {
  screen.innerHTML = "";
}

function showWelcome() {
  clearScreen();
  println("SEJA BEM-VINDO!", "line-title");
  println("SELECIONE UMA OPÇÃO:", "line-dim");
  println("1 - ENTRAR");
  println("2 - SAIR");
  state = "WELCOME";
}

function showLoginUser() {
  clearScreen();
  println("=====WAYNE-TRUST INTERNATIONAL ENTERPRISES=====", "line-title");
  println("ONDE VOCÊ REALIZA SEUS SONHOS.", "line-dim");
  blank();
  println("USUÁRIOS DISPONÍVEIS: [" + usuarios.join(", ") + "]");
  println("SENHAS: [" + senhas.join(", ") + "]", "line-dim");
  println("INFORME O USUÁRIO: (1 PARA ENCERRAR)", "line-prompt");
  state = "LOGIN_USER";
}

function showLoginPass() {
  println("USUÁRIO ENCONTRADO.", "line-value");
  println("INFORME A SENHA: (1 PARA ENCERRAR)", "line-prompt");
  state = "LOGIN_PASS";
}

function showMenu() {
  clearScreen();
  println("OLÁ " + usuarios[posicaoUsuario] + "!", "line-title");
  println("SELECIONE UMA OPÇÃO:", "line-dim");
  println("1 - CONSULTAR BAT-DÓLARES");
  println("2 - REALIZAR SAQUE");
  println("3 - REALIZAR DEPÓSITO");
  println("4 - SAIR");
  state = "MENU";
}

function encerrar() {
  println("TERMINANDO SESSÃO...", "line-dim");
  setTimeout(() => {
    println("SISTEMA DA WAYNE-TRUST ENCERRADO.", "line-error");
    input.disabled = true;
    input.placeholder = "sessão encerrada";
  }, 1800);
  state = "ENDED";
}

function handleWelcome(raw) {
  if (raw === "1") {
    blank();
    showLoginUser();
  } else if (raw === "2") {
    println("SISTEMA DA WAYNE-TRUST ENCERRADO.", "line-error");
    input.disabled = true;
    input.placeholder = "sessão encerrada";
    state = "ENDED";
  } else {
    println("ERRO: DIGITE APENAS NÚMEROS (1 OU 2).", "line-error");
  }
}

function handleLoginUser(raw) {
  if (raw === "1") {
    encerrar();
    return;
  }
  const nome = raw.toUpperCase();
  if (!/^[A-Z ]+$/.test(nome)) {
    println("ERRO: O NOME DEVE CONTER APENAS LETRAS.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    return;
  }
  const idx = usuarios.indexOf(nome);
  if (idx === -1) {
    println("USUÁRIO NÃO ENCONTRADO. TENTE NOVAMENTE.", "line-error");
    blank();
    showLoginUser();
    return;
  }
  posicaoUsuario = idx;
  showLoginPass();
}

function handleLoginPass(raw) {
  if (raw === "1") {
    encerrar();
    return;
  }
  if (!/^-?\d+$/.test(raw)) {
    println("ERRO: DIGITE APENAS NÚMEROS.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    return;
  }
  const tentativa = parseInt(raw, 10);
  if (tentativa === senhas[posicaoUsuario]) {
    println("ENCONTRANDO DADOS DO USUÁRIO...", "line-dim");
    println("COMPILANDO SISTEMA...", "line-dim");
    setTimeout(showMenu, 2200);
    state = "LOADING";
  } else {
    println("SENHA INCORRETA. TENTE NOVAMENTE.", "line-error");
    println("DICA: CONTÉM TRÊS NÚMEROS.", "line-dim");
  }
}

function handleMenu(raw) {
  if (!/^-?\d+$/.test(raw)) {
    println("OPÇÃO INVÁLIDA. TENTE NOVAMENTE.", "line-error");
    return;
  }
  const opcao = parseInt(raw, 10);
  if (opcao === 1) {
    println("USUÁRIO: " + usuarios[posicaoUsuario]);
    println("SALDO DISPONÍVEL: " + saldos[posicaoUsuario] + " BAT-DÓLARES", "line-value");
    blank();
  } else if (opcao === 2) {
    println("USUÁRIO: " + usuarios[posicaoUsuario]);
    println("SALDO DISPONÍVEL: " + saldos[posicaoUsuario] + " BAT-DÓLARES", "line-value");
    println("INFORME O VALOR QUE DESEJA RETIRAR:", "line-prompt");
    state = "SAQUE";
  } else if (opcao === 3) {
    println("USUÁRIO: " + usuarios[posicaoUsuario]);
    println("SALDO DISPONÍVEL: " + saldos[posicaoUsuario] + " BAT-DÓLARES", "line-value");
    println("INFORME O VALOR QUE DESEJA DEPOSITAR:", "line-prompt");
    state = "DEPOSITO";
  } else if (opcao === 4) {
    println("AGRADECEMOS SUA CONFIANÇA NA WAYNE-TRUST!", "line-title");
    println("AQUI, NÓS PREZAMOS PELA SUA SEGURANÇA.", "line-dim");
    blank();
    println("SAINDO... AGUARDE.", "line-dim");
    setTimeout(() => {
      blank();
      showLoginUser();
    }, 2200);
    state = "LOADING";
  } else {
    println("OPÇÃO INVÁLIDA. TENTE NOVAMENTE.", "line-error");
  }
}

const notasDisponiveis = [200, 100, 50, 20, 10, 5, 2];

function handleSaque(raw) {
  if (!/^-?\d+(\.\d+)?$/.test(raw)) {
    println("ERRO: DIGITE APENAS NÚMEROS.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    return;
  }
  const valor = parseFloat(raw);

  if (valor > saldos[posicaoUsuario]) {
    println("O SALDO DISPONÍVEL É MENOR DO QUE O VALOR INFORMADO PARA RETIRADA.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    setTimeout(showMenu, 2800);
    state = "MENU_WAIT";
    return;
  }
  if (valor < 0) {
    println("O VALOR INFORMADO NÃO EXISTE.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    setTimeout(showMenu, 2800);
    state = "MENU_WAIT";
    return;
  }

  println("PROCESSANDO OPERAÇÃO...", "line-dim");
  saldos[posicaoUsuario] = saldos[posicaoUsuario] - valor;
  println("RETIRADA NO VALOR DE " + valor + " BAT-DÓLARES CONCLUÍDA.");
  println("SEU SALDO ATUAL É DE: " + saldos[posicaoUsuario] + " BAT-DÓLARES", "line-value");
  println("NOTAS ENTREGUES:", "line-prompt");

  let restante = valor;
  for (let i = 0; i < notasDisponiveis.length; i++) {
    const quantidade = Math.floor(restante / notasDisponiveis[i]);
    restante = restante % notasDisponiveis[i];
    if (quantidade > 0) {
      println(notasDisponiveis[i] + " BAT-DÓLARES: " + quantidade, "line-value");
    }
  }

  blank();
  state = "MENU_WAIT";
  setTimeout(showMenu, 4000);
}

function handleDeposito(raw) {
  if (!/^-?\d+(\.\d+)?$/.test(raw)) {
    println("ERRO: DIGITE APENAS NÚMEROS.", "line-error");
    println("TENTE NOVAMENTE.", "line-error");
    return;
  }
  const valor = parseFloat(raw);
  println("PROCESSANDO OPERAÇÃO...", "line-dim");
  saldos[posicaoUsuario] = saldos[posicaoUsuario] + valor;
  println("DEPÓSITO NO VALOR DE " + valor + " BAT-DÓLARES CONCLUÍDO.");
  println("SEU SALDO ATUAL É DE: " + saldos[posicaoUsuario] + " BAT-DÓLARES", "line-value");
  blank();
  state = "MENU_WAIT";
  setTimeout(showMenu, 2800);
}

input.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const raw = input.value.trim();
  if (raw === "" || state === "LOADING" || state === "MENU_WAIT" || state === "ENDED") return;

  println("> " + raw, "line-dim");
  input.value = "";

  switch (state) {
    case "WELCOME": handleWelcome(raw); break;
    case "LOGIN_USER": handleLoginUser(raw); break;
    case "LOGIN_PASS": handleLoginPass(raw); break;
    case "MENU": handleMenu(raw); break;
    case "SAQUE": handleSaque(raw); break;
    case "DEPOSITO": handleDeposito(raw); break;
  }
});

showWelcome();
</script>
</body>
</html>
